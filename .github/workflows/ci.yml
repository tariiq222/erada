name: CI

on:
  workflow_dispatch:
    inputs:
      shards:
        description: Number of PostgreSQL PHPUnit shards
        required: false
        default: '4'
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Job 1: Check for SQLite usage (MUST pass)
  # ═══════════════════════════════════════════════════════════════
  sqlite-guard:
    name: 🛡️ SQLite Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for SQLite usage
        run: |
          echo "🔍 Checking for SQLite usage..."

          # Check 1: DB_CONNECTION=sqlite in env files
          if grep -rn "DB_CONNECTION=sqlite" .env.example .env.testing 2>/dev/null; then
            echo "❌ Found DB_CONNECTION=sqlite in env files!"
            exit 1
          fi

          # Check 2: sqlite in phpunit.xml
          if grep -n 'value="sqlite"' phpunit.xml 2>/dev/null; then
            echo "❌ Found sqlite in phpunit.xml!"
            exit 1
          fi

          # Check 3: :memory: database
          if grep -rn ":memory:" phpunit.xml .env.* 2>/dev/null; then
            echo "❌ Found :memory: database!"
            exit 1
          fi

          echo "✅ No SQLite usage detected"

  # ═══════════════════════════════════════════════════════════════
  # Job 2: Tests with PostgreSQL
  # ═══════════════════════════════════════════════════════════════
  test:
    name: 🧪 Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: sqlite-guard

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: iradah_pmo_test
          POSTGRES_USER: iradah
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_pgsql, redis
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Prepare Laravel runtime dirs
        # CI-1: composer install triggers `php artisan package:discover`
        # (composer.json post-autoload-dump) which boots Laravel. The boot
        # registers Blade directives (AppServiceProvider::configureRateLimiting,
        # line 277), which forces `app('blade.compiler')` to resolve. The
        # BladeCompiler constructor requires a non-empty cache path:
        # `config/view.php` falls back to `realpath(storage_path('framework/views'))`
        # which returns `false` on a fresh checkout. Pre-creating these dirs
        # makes `realpath()` return a valid path so the directive registration
        # does not abort the install.
        #
        # Pass 5 (Pass 4 follow-up): also pre-create storage/fonts so dompdf
        # can write its per-machine font cache without a one-shot local
        # mkdir. The dir is .gitignored (per-machine absolute paths) but
        # the dompdf writer expects to create .ufm and .ttf copies inside
        # it on first render. OVR PDF export (test_export_returns_pdf)
        # would otherwise throw "fopen(.../storage/fonts/ibm_plex_*_*.ufm):
        # No such file or directory".
        run: |
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/logs
          mkdir -p storage/fonts
          mkdir -p bootstrap/cache

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Copy .env
        # .env.testing is gitignored (.env.* is excluded except .env.example),
        # so it is absent in CI checkouts — fall back to the tracked .env.example.
        # Test-specific values come from phpunit.xml <env> and the step-level env
        # below, so .env.example is a sufficient base.
        run: |
          cp .env.testing .env 2>/dev/null || cp .env.example .env
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=iradah_pmo_test/' .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Clear Laravel configuration cache
        run: php artisan config:clear

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run sharded PHPUnit suite
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: iradah_pmo_test
          DB_USERNAME: iradah
          DB_PASSWORD: secret
        run: |
          python3 scripts/shard-tests.py \
            --shards "${{ inputs.shards || '4' }}" \
            --host 127.0.0.1 --port 5432 \
            --user iradah --password secret \
            --prefix iradah_pmo_test_shard

      - name: Upload shard reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-shard-reports-${{ matrix.php }}
          path: storage/app/test-shards/
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════
  # Job 3: Code Quality
  # ═══════════════════════════════════════════════════════════════
  quality:
    name: 📋 Code Quality
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: iradah_pmo_test
      DB_USERNAME: iradah
      DB_PASSWORD: secret

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: iradah_pmo_test
          POSTGRES_USER: iradah
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Prepare Laravel runtime dirs
        # CI-1: see the matching step in the `test` job — the same package:discover
        # boot path requires these dirs to exist before `composer install` runs.
        # Pass 5 follow-up: also pre-create storage/fonts for dompdf (see the
        # `test` job step comment for the rationale).
        run: |
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/logs
          mkdir -p storage/fonts
          mkdir -p bootstrap/cache

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Guard canonical authorization architecture
        run: ./vendor/bin/phpunit tests/Architecture/CanonicalAuthorizationResidualGuardTest.php tests/Architecture/CanonicalAuthorizationAssignmentNamingTest.php

      - name: Run PHP Linter (Pint)
        run: ./vendor/bin/pint --test

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=512M --no-progress

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Run Frontend Tests
        run: npm run test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build assets for E2E
        run: npm run build

      - name: Copy .env for E2E
        # .env.testing is gitignored (.env.* is excluded except .env.example),
        # so it is absent in CI checkouts — fall back to the tracked .env.example.
        run: |
          cp .env.testing .env 2>/dev/null || cp .env.example .env
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=iradah_pmo_test/' .env

      - name: Generate app key for E2E
        run: php artisan key:generate

      - name: Run migrations for E2E
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: iradah_pmo_test
          DB_USERNAME: iradah
          DB_PASSWORD: secret
        run: php artisan migrate --force

      - name: Seed database for E2E
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: iradah_pmo_test
          DB_USERNAME: iradah
          DB_PASSWORD: secret
        run: |
          php artisan db:seed --force
          php artisan users:reset-demo-passwords
          # DemoDataSeeder is best-effort: its org wiring (departments/users lack
          # organization_id) predates the multi-org requirement and is separately
          # rotted. The base seed above already provides the admin user + roles the
          # E2E auth flow needs, so demo data is optional here — warn, don't fail.
          php artisan db:seed --class=DemoDataSeeder --force \
            || echo "::warning::DemoDataSeeder skipped (known demo org-wiring rot); base seed is sufficient for E2E"

      - name: Run E2E tests (Playwright)
        # Still non-blocking: the bring-up above (build/migrate/seed + Playwright's
        # webServer in playwright.config.ts) has only been verified locally against
        # a live server, not on an actual GitHub Actions runner yet. Drop
        # continue-on-error once a real CI run is confirmed green.
        continue-on-error: true
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: iradah_pmo_test
          DB_USERNAME: iradah
          DB_PASSWORD: secret
          APP_ENV: testing
        run: npm run test:e2e

      - name: Security Audit (Composer)
        run: composer audit

      - name: Security Audit (NPM)
        run: npm audit --audit-level=high

  # Canonical authorization gate, including the browser authentication surface.
  authorization-enforce:
    name: Authorization / Enforce Gate
    runs-on: ubuntu-latest
    needs: sqlite-guard
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: iradah_pmo_test
          POSTGRES_USER: iradah
          POSTGRES_PASSWORD: secret
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: iradah_pmo_test
      DB_USERNAME: iradah
      DB_PASSWORD: secret
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, redis
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Prepare Laravel runtime
        run: mkdir -p storage/framework/{views,cache,sessions} storage/logs bootstrap/cache storage/fonts
      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-progress
          npm ci
      - name: Configure application
        run: |
          cp .env.example .env
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=iradah_pmo_test/' .env
          php artisan key:generate
          php artisan config:clear
      - name: Build canonical dataset
        run: |
          php artisan migrate --force
          php artisan db:seed --force
          php artisan users:reset-demo-passwords
      - name: Run cutover preflight
        run: php artisan authz:cutover-preflight
      - name: Verify canonical auth contracts
        run: |
          php artisan test tests/Feature/Auth/AuthMeContractTest.php tests/Feature/Auth/AuthMeCapabilitiesTest.php
          php artisan test tests/Feature/Core/Authorization/CanonicalAdminGateTest.php tests/Feature/Core/Authorization/CanonicalUserBusinessGateTest.php
      - name: Build frontend in enforce mode
        run: npm run build
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run authenticated browser gate
        env:
          APP_URL: http://localhost:8000
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: iradah_pmo_test
          DB_USERNAME: iradah
          DB_PASSWORD: secret
          SANCTUM_STATEFUL_DOMAINS: localhost:8000,127.0.0.1:8000
        run: |
          # The contract PHPUnit tests use RefreshDatabase and may replace the
          # seeded demo rows; restore the browser fixture after those tests.
          php artisan db:seed --force
          php artisan users:reset-demo-passwords
          npx playwright test e2e/core-auth-and-orgs.spec.ts --project=chromium
