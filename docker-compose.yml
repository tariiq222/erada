services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: erada-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-iradah_pmo}
      POSTGRES_USER: ${DB_USERNAME:-iradah}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-iradah} -d ${DB_DATABASE:-iradah_pmo}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # PostgreSQL for Testing (separate instance)
  postgres-test:
    image: postgres:16-alpine
    container_name: erada-platform-postgres-test
    restart: unless-stopped
    # Parallel tests (paratest) run many concurrent migrate:fresh CASCADE drops;
    # the default max_locks_per_transaction (64) overflows the shared lock table.
    # Raise it so `php artisan test --parallel` (and --coverage) run cleanly.
    command: ["postgres", "-c", "max_locks_per_transaction=512"]
    environment:
      POSTGRES_DB: iradah_pmo_test
      POSTGRES_USER: iradah
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # In-memory for faster tests
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iradah -d iradah_pmo_test"]
      interval: 3s
      timeout: 3s
      retries: 5

  # Redis (for cache, sessions, queue)
  redis:
    image: redis:7-alpine
    container_name: erada-platform-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Laravel Application (optional - for full containerized dev)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erada-platform-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=iradah_pmo
      - DB_USERNAME=iradah
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vite:
        condition: service_started
    profiles:
      - full  # Only start with: docker compose --profile full up

  # Independent admin SPA with same-origin API/Sanctum proxying to Laravel.
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        VITE_OPERATIONAL_URL: ${VITE_OPERATIONAL_URL:-http://localhost:8000}
    container_name: erada-platform-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-8080}:80"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://app}
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - full

  # Vite dev server (HMR for React frontend)
  vite:
    image: node:20-alpine
    container_name: erada-platform-vite
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install --no-audit --prefer-offline && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: erada-platform-network
